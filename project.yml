name: Liminal
options:
  bundleIdPrefix: com.liminal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Liminal:
    type: application
    platform: iOS
    sources:
      - path: Liminal
        excludes:
          - "**/*.metal"
          - "**/*.json"
          - "**/*.caf"
    resources:
      - path: Liminal/Shaders
        buildPhase: resources
        type: folder
      - path: Liminal/Resources
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liminal.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    scheme:
      testTargets:
        - LiminalTests
      environmentVariables:
        - variable: METAL_DEVICE_WRAPPER_TYPE
          value: "1"
          isEnabled: true
      runConfig:
        diagnostics:
          mainThreadChecker: true

  LiminalShaderLab:
    type: application
    platform: iOS
    sources:
      - path: LiminalShaderLab
        excludes:
          - "**/*.metal"
    resources:
      - path: LiminalShaderLab/TestShaders
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liminal.shaderlab
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
    scheme:
      environmentVariables:
        - variable: METAL_DEVICE_WRAPPER_TYPE
          value: "1"
          isEnabled: true
      runConfig:
        diagnostics:
          mainThreadChecker: true

  LiminalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiminalTests
    dependencies:
      - target: Liminal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liminal.tests
        GENERATE_INFOPLIST_FILE: true
